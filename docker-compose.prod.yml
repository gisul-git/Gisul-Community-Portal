version: "3.9"

# Production docker-compose.prod.yml
# Nginx runs as a container — no host nginx needed
# Frontend container serves static files via its own internal nginx
# Root nginx.conf routes API prefixes to backend, everything else to frontend

services:

  # ----------------------------------------------------------
  # Nginx Reverse Proxy (handles SSL + routing)
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: gisulmatch-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - gisulmatch_net

  # ----------------------------------------------------------
  # Backend (FastAPI — uvicorn on port 8000)
  # ----------------------------------------------------------
  backend:
    image: ghcr.io/REPLACE_WITH_OWNER/gisul-community-backend:latest
    container_name: gisulmatch-backend
    restart: always
    expose:
      - "8000"
    env_file:
      - backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - faiss_data:/app/backend/data
    networks:
      - gisulmatch_net

  # ----------------------------------------------------------
  # Celery Worker
  # ----------------------------------------------------------
  worker:
    image: ghcr.io/REPLACE_WITH_OWNER/gisul-community-celery:latest
    container_name: gisulmatch-worker
    restart: always
    depends_on:
      - redis
      - backend
    env_file:
      - backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - faiss_data:/app/backend/data
    networks:
      - gisulmatch_net

  # ----------------------------------------------------------
  # Frontend (React build served by nginx:stable-alpine on port 80)
  # ----------------------------------------------------------
  frontend:
    image: ghcr.io/REPLACE_WITH_OWNER/gisul-community-frontend:latest
    container_name: gisulmatch-frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - gisulmatch_net

  # ----------------------------------------------------------
  # Redis (Celery broker + result backend)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: gisulmatch-redis
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - gisulmatch_net

networks:
  gisulmatch_net:
    driver: bridge

volumes:
  redis_data:
    driver: local
  faiss_data:
    driver: local